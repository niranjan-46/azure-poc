trigger:
  branches:
    include:
      - master

# ✅ Force your self-hosted agent
pool:
  name: 'Default'
  demands:
    - agent.name -equals azure-poc

variables:
  MAVEN_CACHE_FOLDER: $(Pipeline.Workspace)/.m2/repository

  registryName: 'devopspocacr'
  repositoryName: 'backend-app'
  tag: $(Build.BuildId)

  azureSubscription: 'azure-service-conn'
  resourceGroup: 'my-rg'
  containerAppName: 'backend-app'

  workingDir: 'experiment-02-maven'

stages:

# ================= BUILD =================
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: MavenBuild
    displayName: 'Maven Build'
    steps:

    - checkout: self

    # ✅ Cache Maven dependencies
    - task: Cache@2
      inputs:
        key: 'maven | "$(Agent.OS)" | $(workingDir)/pom.xml'
        restoreKeys: |
          maven | "$(Agent.OS)"
        path: $(MAVEN_CACHE_FOLDER)

    # ✅ Build using system Maven (FIXED)
    - script: |
        echo "JAVA VERSION:"
        java -version

        echo "MAVEN VERSION:"
        mvn -v

        cd $(workingDir)
        mvn clean package -DskipTests
      displayName: 'Build Maven Project'

# ================= DOCKER =================
- stage: BuildAndPushDocker
  displayName: 'Build and Push Docker Image'
  dependsOn: Build
  jobs:
  - job: DockerBuild
    displayName: 'Docker Build & Push'
    steps:

    - checkout: self

    # ✅ Azure + ACR login
    - task: AzureCLI@2
      displayName: 'Azure Login + ACR Login'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az account show
          az acr login --name $(registryName)

    # ✅ Docker build
    - script: |
        docker build -t $(registryName).azurecr.io/$(repositoryName):$(tag) $(workingDir)
      displayName: 'Build Docker Image'

    # ✅ Docker push
    - script: |
        docker push $(registryName).azurecr.io/$(repositoryName):$(tag)
      displayName: 'Push Docker Image'

# ================= DEPLOY =================
- stage: Deploy
  displayName: 'Deploy to Azure Container App'
  dependsOn: BuildAndPushDocker
  jobs:
  - job: Deploy
    displayName: 'Deploy'
    steps:

    - task: AzureCLI@2
      displayName: 'Deploy to Container App'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az containerapp update \
            --name $(containerAppName) \
            --resource-group $(resourceGroup) \
            --image $(registryName).azurecr.io/$(repositoryName):$(tag)
