trigger:
  branches:
    include:
      - master

pool:
  vmImage: 'ubuntu-latest'

variables:
  MAVEN_CACHE_FOLDER: $(Pipeline.Workspace)/.m2/repository
  MAVEN_OPTS: '-Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)'

  registryName: 'devopspocacr'
  repositoryName: 'backend-app'
  tag: $(Build.BuildId)

  # ✅ FIXED HERE
  azureSubscription: 'azure-service-conn'

  resourceGroup: 'my-rg'
  workingDir: 'experiment-02-maven'

stages:

# ================= BUILD =================
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: MavenBuild
    displayName: 'Maven Build'
    steps:

    - task: Cache@2
      displayName: 'Cache Maven dependencies'
      inputs:
        key: 'maven | "$(Agent.OS)" | $(workingDir)/pom.xml'
        restoreKeys: |
          maven | "$(Agent.OS)"
        path: $(MAVEN_CACHE_FOLDER)

    - task: Maven@4
      displayName: 'Build Maven Project'
      inputs:
        mavenPomFile: '$(workingDir)/pom.xml'
        goals: 'clean package'
        options: '-DskipTests'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.17'

# ================= DOCKER =================
- stage: BuildAndPushDocker
  displayName: 'Build and Push Docker Image'
  dependsOn: Build
  jobs:
  - job: DockerBuild
    displayName: 'Docker Build & Push'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: AzureCLI@2
      displayName: 'Login to Azure'
      inputs:
        azureSubscription: 'azure-service-conn'   # ✅ FIXED
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(registryName)

    - task: Docker@2
      displayName: 'Build and Push Image'
      inputs:
        command: buildAndPush
        containerRegistry: 'devopspocacr'
        repository: '$(repositoryName)'
        dockerfile: '$(workingDir)/Dockerfile'
        buildContext: '$(workingDir)'
        tags: |
          $(tag)

# ================= DEPLOY =================
- stage: Deploy
  displayName: 'Deploy to Azure Container App'
  dependsOn: BuildAndPushDocker
  jobs:
  - job: Deploy
    displayName: 'Deploy'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: AzureCLI@2
      displayName: 'Update Container App'
      inputs:
        azureSubscription: 'azure-service-conn'   # ✅ FIXED
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az containerapp update \
            --name $(repositoryName) \
            --resource-group $(resourceGroup) \
            --image $(registryName).azurecr.io/$(repositoryName):$(tag)