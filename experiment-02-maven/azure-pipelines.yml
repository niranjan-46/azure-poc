trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  MAVEN_CACHE_FOLDER: $(Pipeline.Workspace)/.m2/repository
  MAVEN_OPTS: '-Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)'

  registryName: 'devopspocacr'
  repositoryName: 'backend-app'
  tag: $(Build.BuildId)

  # 🔥 IMPORTANT: Replace with your actual service connection name
  azureSubscription: 'azure-service-conn'

  resourceGroup: 'my-rg'
  workingDir: 'experiment-02-maven'

stages:

# ================= BUILD STAGE =================
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: MavenBuild
    displayName: 'Maven Build'
    steps:

    - task: Cache@2
      inputs:
        key: 'maven | "$(Agent.OS)" | $(workingDir)/pom.xml'
        restoreKeys: |
          maven | "$(Agent.OS)"
        path: $(MAVEN_CACHE_FOLDER)
      displayName: 'Cache Maven dependencies'

    - task: Maven@4
      displayName: 'Build Maven Project'
      inputs:
        mavenPomFile: '$(workingDir)/pom.xml'
        goals: 'clean package'
        options: '-DskipTests'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.17'

# ================= DOCKER BUILD & PUSH =================
- stage: BuildAndPushDocker
  displayName: 'Build and Push Docker Image'
  dependsOn: Build
  jobs:
  - job: DockerBuild
    displayName: 'Docker Build & Push'
    steps:

    # Login to Azure
    - task: AzureCLI@2
      displayName: 'Azure Login'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(registryName)

    # Build Docker image
    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: build
        repository: '$(registryName).azurecr.io/$(repositoryName)'
        dockerfile: '$(workingDir)/Dockerfile'
        buildContext: '$(workingDir)'
        tags: |
          $(tag)

    # Push Docker image
    - task: Docker@2
      displayName: 'Push Docker Image'
      inputs:
        command: push
        repository: '$(registryName).azurecr.io/$(repositoryName)'
        tags: |
          $(tag)

# ================= DEPLOY =================
- stage: Deploy
  displayName: 'Deploy to Azure Container App'
  dependsOn: BuildAndPushDocker
  jobs:
  - deployment: DeployToContainerApp
    displayName: 'Deploy'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Update Container App'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az containerapp update \
                  --name $(repositoryName) \
                  --resource-group $(resourceGroup) \
                  --image $(registryName).azurecr.io/$(repositoryName):$(tag)