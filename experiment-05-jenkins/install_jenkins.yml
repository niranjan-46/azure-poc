---
- name: Install Jenkins on Ubuntu VM
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Java 21
      apt:
        name: openjdk-21-jre
        state: present

    - name: Install fontconfig (required for Jenkins)
      apt:
        name: fontconfig
        state: present

    - name: Download Jenkins GPG key
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc
        mode: '0644'

    - name: Add Jenkins repository
      apt_repository:
        repo: 'deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/'
        state: present
        filename: jenkins

    - name: Update apt cache after adding Jenkins repo
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Start and enable Jenkins service
      systemd:
        name: jenkins
        state: started
        enabled: yes

    - name: Wait for Jenkins to start
      pause:
        seconds: 10

    - name: Display Jenkins initial admin password
      command: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_password

    - name: Print Jenkins URL and password
      debug:
        msg:
          - "Jenkins is installed and running!"
          - "URL: http://{{ ansible_default_ipv4.address }}:8080"
          - "Initial admin password: {{ jenkins_password.stdout }}"
          - "Follow the setup wizard at the URL above."